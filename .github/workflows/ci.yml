# CI is the machine enforcement of the frozen Engineering Workflow verification gate (RM1).
# Stages: structure/contract-drift -> build -> unit -> contract-compliance -> integration -> boundary.
# Non-skippable; red blocks merge. Do not weaken gates.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Contracts are generated, not hand-edited (drift check)
        run: |
          python tools/generate_contracts.py
          git diff --exit-code -- contracts/python \
            || (echo "contracts/python is stale — regenerate from schemas" && exit 1)

      - name: Lint (ruff)
        run: ruff check src tests tools

      - name: Boundary / dependency-direction (import-linter)
        run: lint-imports

      - name: Unit + contract-compliance + integration + boundary tests
        run: pytest -q

      - name: Boundary DAG (no MiniFlyWire import; Law 4)
        run: pytest -q tests/boundary
